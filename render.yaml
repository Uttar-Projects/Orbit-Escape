# Render Blueprint — MongoDB Atlas (no Render Postgres required)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: orbit-escape
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run db:migrate
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
